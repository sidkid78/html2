<script>

        mono: ['JetBrains Mono', 'monospace'],

        industrial: {

<style>
  :root {
    --scanline-color: rgba(6, 182, 212, 0.05);
  }
  body {
    background-color: #050505;
    color: #e2e8f0;
    overflow-x: hidden;
    cursor: none;
  }
  ::selection {
    background: #eab308;
    color: #000;
  }
  .noise-overlay {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 50;
    opacity: 0.15;
    mix-blend-mode: overlay;
  }
  .scanlines {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 49;
    background: linear-gradient(to bottom, transparent 50%, var(--scanline-color) 51%);
    background-size: 100% 4px;
  }
  .custom-cursor {
    position: fixed;
    top: 0;
    left: 0;
    width: 20px;
    height: 20px;
    border: 1px solid #06b6d4;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 100;
    transition: width 0.2s, height 0.2s, background-color 0.2s;
    mix-blend-mode: difference;
  }
  .custom-cursor::after {
    content: '';
    position: absolute;
    top: 50%;
    left: -10px;
    right: -10px;
    height: 1px;
    background: #06b6d4;
  }
  .custom-cursor::before {
    content: '';
    position: absolute;
    left: 50%;
    top: -10px;
    bottom: -10px;
    width: 1px;
    background: #06b6d4;
  }
  .clip-brutal {
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
  }
  .clip-brutal-reverse {
    clip-path: polygon(20px 0, 100% 0, 100% 100%, 0 100%, 0 20px);
  }
  @keyframes pulse-glow {
    0%, 100% { opacity: 1; filter: drop-shadow(0 0 5px #06b6d4); }
    50% { opacity: 0.6; filter: drop-shadow(0 0 2px #06b6d4); }
  }
  .animate-pulse-glow { animation: pulse-glow 3s infinite; }
  @keyframes glitch-anim {
    0% { clip-path: inset(10% 0 80% 0); transform: translate(-2px, 2px); }
    20% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
    40% { clip-path: inset(30% 0 40% 0); transform: translate(-2px, 2px); }
    60% { clip-path: inset(5% 0 80% 0); transform: translate(2px, -2px); }
    80% { clip-path: inset(60% 0 10% 0); transform: translate(-2px, 2px); }
    100% { clip-path: inset(10% 0 80% 0); transform: translate(0); }
  }
  .glitch:hover::before {
    content: attr(data-text);
    position: absolute;
    left: -2px;
    text-shadow: 2px 0 red;
    top: 0;
    color: white;
    background: #050505;
    overflow: hidden;
    animation: glitch-anim 0.3s infinite linear alternate-reverse;
  }
  .glitch:hover::after {
    content: attr(data-text);
    position: absolute;
    left: 2px;
    text-shadow: -2px 0 blue;
    top: 0;
    color: white;
    background: #050505;
    overflow: hidden;
    animation: glitch-anim 0.4s infinite linear alternate-reverse;
  }
  .terminal-box {
    background: rgba(15, 17, 21, 0.9);
    border: 1px solid rgba(6, 182, 212, 0.3);
    box-shadow: 0 0 20px rgba(6, 182, 212, 0.05) inset;
  }
  .terminal-text {
    text-shadow: 0 0 5px rgba(6, 182, 212, 0.5);
  }
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .reveal.active {
    opacity: 1;
    transform: translateY(0);
  }
  .hide-scrollbar::-webkit-scrollbar {
    display: none;
  }
  .hide-scrollbar {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
</script>

<script>
  // Custom Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', (e) => {
    cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
  });

  // Reveal on scroll
  const revealElements = document.querySelectorAll('.reveal');
  const revealOptions = {
    threshold: 0.15,
    rootMargin: "0px 0px -50px 0px"
  };

  const revealOnScroll = new IntersectionObserver(function(entries, observer) {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      entry.target.classList.add('active');
      observer.unobserve(entry.target);
    });
  }, revealOptions);

  revealElements.forEach(el => {
    revealOnScroll.observe(el);
  });

  // Interactive Cursor expansion on links/interactive elements
  const interactives = document.querySelectorAll('.group, .terminal-box, .glitch');
  interactives.forEach(el => {
    el.addEventListener('mouseenter', () => {
      cursor.style.width = '40px';
      cursor.style.height = '40px';
      cursor.style.backgroundColor = 'rgba(6, 182, 212, 0.1)';
    });
    el.addEventListener('mouseleave', () => {
      cursor.style.width = '20px';
      cursor.style.height = '20px';
      cursor.style.backgroundColor = 'transparent';
    });
  });
</script>
