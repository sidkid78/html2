<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAIRGIG: The Origin</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --fg: #f4f4f5;
            --accent-red: #ff3333;
            --font-head: 'Anton', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-body);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.8;
            filter: contrast(1.1) brightness(0.9);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(5, 5, 5, 0.7) 0%, rgba(5, 5, 5, 0.2) 50%, rgba(5, 5, 5, 0.9) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .ui-layer {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 10;
        }

        .label {
            font-family: var(--font-head);
            font-size: clamp(2rem, 4vw, 4rem);
            color: var(--fg);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1;
        }

        .label span {
            color: var(--accent-red);
        }

        .audio-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 10000;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s var(--ease-out);
            color: #888;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .audio-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: var(--fg);
        }

        .audio-toggle.active {
            color: var(--accent-red);
            border-color: var(--accent-red);
        }

        .sound-bars {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 15px;
        }

        .bar {
            width: 2px;
            height: 100%;
            background: currentColor;
            border-radius: 2px;
        }

        .active .bar {
            animation: sound-bar-anim 1s infinite ease-in-out alternate;
        }

        .active .bar:nth-child(2) {
            animation-delay: 0.2s;
        }

        .active .bar:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes sound-bar-anim {
            0% {
                height: 30%;
            }

            100% {
                height: 100%;
            }
        }
    </style>
</head>

<body>

    <div id="audio-control" class="audio-toggle">
        <div class="sound-bars">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <span id="audio-status">Start Experience</span>
    </div>

    <!-- Background Audio -->
    <audio id="bg-music" src="./audio/fairgigbackground2.mp3" preload="auto"></audio>
    <!-- Spoken Audio Parts -->
    <audio id="part-1" src="./audio/part-1.wav" preload="auto"></audio>
    <audio id="part-2" src="./audio/part-2.wav" preload="auto"></audio>
    <audio id="part-3" src="./audio/part-3.wav" preload="auto"></audio>
    <audio id="part-4" src="./audio/part-4.wav" preload="auto"></audio>
    <audio id="part-5" src="./audio/part-5.wav" preload="auto"></audio>

    <div class="ui-layer">
        <div class="label">FAIR<span>GIG</span></div>
    </div>

    <div class="video-container">
        <div class="overlay"></div>
        <!-- Main Video -->
        <video id="main-video" src="./video/fairgigvideo2.mp4" playsinline preload="auto" muted></video>
    </div>

    <script>
        const audioToggle = document.getElementById('audio-control');
        const audioStatus = document.getElementById('audio-status');
        const bgMusic = document.getElementById('bg-music');
        const mainVideo = document.getElementById('main-video');

        // Hide video initially while part-1 plays
        mainVideo.style.opacity = '0';
        mainVideo.style.transition = 'opacity 1s ease-in-out';

        let isPlaying = false;
        let currentPart = 1;
        let part2Timeout = null;

        // Sequence logic
        for (let i = 1; i <= 4; i++) {
            document.getElementById(`part-${i}`).addEventListener('ended', () => {
                currentPart = i + 1;
                if (isPlaying) {
                    const nextAudio = document.getElementById(`part-${currentPart}`);

                    // Video starts when part-1 ends
                    if (i === 1) {
                        mainVideo.style.opacity = '0.8'; // Match original CSS opacity
                        mainVideo.currentTime = 0;
                        mainVideo.muted = false; // or true if video has no sound anyway
                        mainVideo.play().catch(e => console.warn('Video play failed:', e));

                        // Delay part-2 by 8 seconds
                        if (nextAudio) {
                            nextAudio.currentTime = 0;
                            part2Timeout = setTimeout(() => {
                                if (isPlaying && currentPart === 2) {
                                    mainVideo.muted = true; // Mute video so narration can take over purely with background music
                                    nextAudio.play().catch(e => console.warn('Next audio play failed:', e));
                                    part2Timeout = null;
                                }
                            }, 8000);
                        }
                    } else {
                        if (nextAudio) {
                            nextAudio.currentTime = 0;
                            nextAudio.play().catch(e => console.warn('Next audio play failed:', e));
                        }
                    }
                }
            });
        }

        audioToggle.addEventListener('click', () => {
            isPlaying = !isPlaying;

            if (isPlaying) {
                audioToggle.classList.add('active');
                audioStatus.innerText = "Audio On";

                // Restart from beginning if bgMusic ended completely
                if (bgMusic.ended || (currentPart >= 5 && document.getElementById('part-5').ended)) {
                    bgMusic.currentTime = 0;
                    currentPart = 1;
                    for (let i = 1; i <= 5; i++) document.getElementById(`part-${i}`).currentTime = 0;
                    mainVideo.currentTime = 0;
                    mainVideo.style.opacity = '0';
                    mainVideo.pause();
                }

                // Play background music (reduced by 20%)
                bgMusic.volume = 0.3;
                bgMusic.play().catch(e => console.warn('Background music play failed:', e));

                // Resume the current spoken audio track
                const activeAudio = document.getElementById(`part-${currentPart}`);
                if (activeAudio) {
                    activeAudio.play().catch(e => console.warn('Active audio play failed:', e));
                    if (part2Timeout) {
                        clearTimeout(part2Timeout);
                        part2Timeout = null;
                        mainVideo.muted = true; // Force mute if they paused & resumed during the gap
                    }
                }

                // If we are past part-1, also resume the video
                if (currentPart > 1 && !mainVideo.ended) {
                    mainVideo.play().catch(e => console.warn('Video play failed:', e));
                }

            } else {
                audioToggle.classList.remove('active');
                audioStatus.innerText = "Audio Off";

                // Pause everything
                bgMusic.pause();

                if (part2Timeout) {
                    clearTimeout(part2Timeout);
                    part2Timeout = null;
                }

                for (let i = 1; i <= 5; i++) {
                    const a = document.getElementById(`part-${i}`);
                    if (a) a.pause();
                }

                mainVideo.pause();
            }
        });
    </script>
</body>

</html>
