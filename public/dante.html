<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANTE | The Inferno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom font for that heavy, ancient feel */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400&display=swap');

        body {
            font-family: 'Cinzel', serif;
            background-color: #050505;
            /* Near pitch-black */
            color: #e5e5e5;
        }

        h1,
        h2,
        h3 {
            font-family: 'Cinzel', serif;
        }

        .hellfire-text {
            color: #fff;
            text-shadow: 
                0 -2px 4px #fff,
                0 -6px 10px #ff0,
                0 -10px 20px #ff8000,
                0 -18px 40px #f00;
            animation: flicker 1s infinite alternate;
        }

        @keyframes flicker {
            0%, 100% {
                text-shadow: 
                    0 -2px 4px #fff,
                    0 -6px 10px #ff0,
                    0 -10px 20px #ff8000,
                    0 -18px 40px #f00;
            }
            25% {
                text-shadow: 
                    0 -2px 4px #fff,
                    0 -8px 12px #ff0,
                    0 -12px 25px #ff8000,
                    0 -20px 45px #f00;
            }
            50% {
                text-shadow: 
                    0 -3px 5px #fff,
                    0 -7px 11px #ff0,
                    0 -11px 22px #ff8000,
                    0 -19px 42px #f00;
            }
            75% {
                text-shadow: 
                    0 -1px 3px #fff,
                    0 -5px 9px #ff0,
                    0 -9px 18px #ff8000,
                    0 -17px 38px #f00;
            }
        }
    </style>
</head>

<body class="antialiased overflow-x-hidden selection:bg-red-900 selection:text-white">

    <header class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0 bg-black">
            <img src="./images/dante_bg.png" alt="Dante's Inferno — The Nine Circles of Hell"
                class="w-full h-full object-cover opacity-40">
            <div class="absolute inset-0 bg-gradient-to-b from-transparent via-[#050505]/80 to-[#050505]"></div>
        </div>

        <div class="relative z-10 text-center px-4 max-w-4xl mx-auto flex flex-col items-center">
            <p class="uppercase tracking-[0.3em] text-sm text-gray-400 mb-4">A Cinematic Descent</p>
            <h1 class="text-7xl md:text-9xl font-black mb-6 tracking-widest hellfire-text drop-shadow-2xl">
                INFERNO
            </h1>
            <p class="text-lg md:text-xl text-gray-300 font-light max-w-2xl leading-relaxed mb-10">
                Abandon all hope, ye who enter here. Experience the nine circles of Hell through a groundbreaking
                synthesis of generative video and spatial audio.
            </p>
            <button
                class="border border-red-800 bg-red-900/20 hover:bg-red-900/40 text-red-100 px-8 py-4 uppercase tracking-widest text-sm transition-all duration-300 backdrop-blur-sm">
                Begin the Descent
            </button>
        </div>
    </header>

    <section class="min-h-screen flex items-center justify-center py-20 px-4">
        <div
            class="w-full max-w-6xl aspect-video bg-black border border-gray-800 shadow-[0_0_50px_rgba(153,0,0,0.1)] flex items-center justify-center overflow-hidden">
            <iframe 
                class="w-full h-full" 
                src="https://www.youtube.com/embed/NnWDkw1vrW4" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
            </iframe>
        </div>
    </section>

</body>

</html>
